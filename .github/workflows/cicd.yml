name: Python CI
 
on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch    

 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install -r requirements.txt
      - run: python -m pytest test_app.py -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t image:latest .
      - run: docker run -d --name app -p 5000:5000 image:latest && sleep 5 && curl http://127.0.0.1:5000/health


