name: Hello GitHub Actions

on:
  push:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: 打招呼
        run: echo "Hello GitHub Actions!"
      - name: 顯示目前時間
        run: date
      - name: 顯示系統資訊
        run: |
          uname -a
          pwd
          echo "作業系統："
          uname -a
          echo "目前目錄："
          pwd
