name: Docker Build & Push
 
on:
  push:
    branches:
      - main
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4
 
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 安裝依賴
        run: pip install -r requirements.txt
 
      - name: 執行測試
        run: pytest test_app.py -v
 
  docker:
    runs-on: ubuntu-latest
    needs: test              # 等 test job 通過才跑
    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4
 
      - name: Create image tags
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/my-flask-app" >> $GITHUB_OUTPUT
 
      - name: Build image locally
        run: docker build -t ${{ steps.meta.outputs.image }}:latest .
 
      - name: Run container
        run: docker run -d --name app -p 5000:5000 -e SKIP_DB_INIT=true ${{ steps.meta.outputs.image }}:latest
 
      - name: Check health endpoint
        run: |
          sleep 5
          curl --fail http://127.0.0.1:5000/health

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image }}:latest
